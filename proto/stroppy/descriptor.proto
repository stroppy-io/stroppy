syntax = "proto3";

package stroppy;

option go_package = "github.com/stroppy-io/stroppy/pkg/common/proto/stroppy";

/**
 * TxIsolationLevel defines the isolation level for a database transaction.
 */
enum TxIsolationLevel {
  UNSPECIFIED = 0;
  READ_UNCOMMITTED = 1;
  READ_COMMITTED = 2;
  REPEATABLE_READ = 3;
  SERIALIZABLE = 4;
  /** Pinned connection without BEGIN/COMMIT. For databases without transaction support. */
  CONNECTION_ONLY = 5;
  /** No transaction or connection pinning. Queries go through the driver pool directly. */
  NONE = 6;
}
