syntax = "proto3";

package stroppy;

import "proto/stroppy/common.proto";
import "validate/validate.proto";

option go_package = "github.com/stroppy-io/stroppy/pkg/common/proto/stroppy";

/**
 * DriverConfig contains configuration for connecting to a database driver.
 * Driver is created as an empty shell via DriverX.create() and configured
 * via driver.setup(config) at runtime. Sharing semantics are determined
 * by the k6 lifecycle stage: init phase = shared, iteration = per-VU.
 */
message DriverConfig {
  /** Database connection URL */
  string url = 1 [ (validate.rules).string.uri_ref = true ];

  enum DriverType {
    DRIVER_TYPE_UNSPECIFIED = 0;
    DRIVER_TYPE_POSTGRES = 1;
    DRIVER_TYPE_MYSQL = 2;
  }

  /** Name/Type of chosen driver */
  DriverType driver_type = 2 [ (validate.rules).enum.defined_only = true ];

  /** PostgreSQL-specific pool and connection configuration */
  message PostgresConfig {
    /** pgx trace log level: debug, info, warn, error */
    optional string trace_log_level = 1;
    /** Max connection lifetime (Go duration string, e.g. "1h") */
    optional string max_conn_lifetime = 2;
    /** Max connection idle time (Go duration string, e.g. "10m") */
    optional string max_conn_idle_time = 3;
    /** Maximum number of connections in the pool */
    optional int32 max_conns = 4;
    /** Minimum number of connections in the pool */
    optional int32 min_conns = 5;
    /** Minimum number of idle connections */
    optional int32 min_idle_conns = 6;
    /** Query execution mode: exec, cache_statement, cache_describe,
     * describe_exec, simple_protocol */
    optional string default_query_exec_mode = 7;
    /** Description cache capacity (only with cache_describe mode) */
    optional int32 description_cache_capacity = 8;
    /** Statement cache capacity (only with cache_statement mode) */
    optional int32 statement_cache_capacity = 9;
  }

  /** Generic database/sql pool settings for SQL-based drivers */
  message SqlConfig {
    /** Maximum number of open connections */
    optional int32 max_open_conns = 1;
    /** Maximum number of idle connections */
    optional int32 max_idle_conns = 2;
    /** Maximum connection lifetime (Go duration string, e.g. "1h") */
    optional string conn_max_lifetime = 3;
    /** Maximum idle connection time (Go duration string, e.g. "10m") */
    optional string conn_max_idle_time = 4;
    /** Rows per bulk INSERT statement */
    optional int32 bulk_size = 5;
  }

  /** Error handling mode for query and insert operations */
  enum ErrorMode {
    ERROR_MODE_UNSPECIFIED = 0;
    ERROR_MODE_SILENT = 1;
    ERROR_MODE_LOG = 2;
    ERROR_MODE_THROW = 3;
  }

  /** How to handle errors in query/insert operations.
   *  SILENT: record metric only. LOG: record metric + console.log. THROW: rethrow. */
  ErrorMode error_mode = 3;

  /** Driver-specific configuration, exactly one must match driver_type */
  oneof driver_specific {
    PostgresConfig postgres = 10;
    SqlConfig sql = 11;
  }
}

/**
 * LoggerConfig contains configuration for the logging system.
 * It controls log levels and output formatting.
 */
message LoggerConfig {
  enum LogLevel {
    LOG_LEVEL_DEBUG = 0;
    LOG_LEVEL_INFO = 1;
    LOG_LEVEL_WARN = 2;
    LOG_LEVEL_ERROR = 3;
    LOG_LEVEL_FATAL = 4;
  }
  enum LogMode {
    LOG_MODE_DEVELOPMENT = 0;
    LOG_MODE_PRODUCTION = 1;
  }
  /** Minimum log level to output */
  LogLevel log_level = 1 [ (validate.rules).enum.defined_only = true ];
  /** Logging mode (development or production) */
  LogMode log_mode = 2 [ (validate.rules).enum.defined_only = true ];
}

/**
 * OtlpExporterConfig contains named configuration for an OTLP exporter.
 */
message ExporterConfig {
  /** Name of the OTLP exporter */
  string name = 1 [ (validate.rules).string.min_len = 1 ];
  /** Configuration for the OTLP exporter */
  stroppy.OtlpExport otlp_export = 2
      [ (validate.rules).message.required = true ];
}

message GlobalConfig {
  /**
   * Version of the configuration format e.g. proto files version.
   * This is used for backward compatibility of configs
   * and will be set automatically from binary run if not present.
   */
  string version = 1;
  /**
   * Run identifier for reproducible test runs or debugging
   * If set to "generate()" stroppy eval ulid for run_id
   */
  string run_id = 2;
  /** Random seed for reproducible test runs */
  uint64 seed = 3 [ (validate.rules).uint64.gte = 0 ];
  /** Arbitrary metadata, may be passed to result labels and json output */
  map<string, string> metadata = 4;
  /** Logging configuration */
  stroppy.LoggerConfig logger = 5;
  /** Exporter configuration */
  stroppy.ExporterConfig exporter = 6;
}
