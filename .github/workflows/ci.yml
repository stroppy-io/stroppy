name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_call:

jobs:
  golang-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.3"
          cache: true

      - name: Install linter dependencies
        run: make install-linter

      - name: Run linter
        run: make linter

      - name: Run tests
        run: make tests

  typescript-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install TS dependencies
        run: make ts-setup

      - name: Run type check
        run: make ts-typecheck

      - name: Run TS tests
        run: make ts-test

  build:
    needs: [golang-ci, typescript-ci]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.3"
          cache: true

      - name: Install xk6 (k6 builder)
        run: make install-xk6

      - name: Compute short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          CGO_ENABLED: "0"
          XK6_RACE_DETECTOR: "0"
          GOOS: linux
          GOARCH: amd64
          VERSION: nightly-${{ steps.sha.outputs.short }}
        run: make build

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: stroppy-linux-amd64
          path: build/stroppy
          if-no-files-found: error
          retention-days: 7

      - name: Pre-release per commit
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ steps.sha.outputs.short }}
          name: nightly-${{ steps.sha.outputs.short }}
          prerelease: true
          files: build/stroppy
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  integration:
    needs: [golang-ci, typescript-ci]
    uses: ./.github/workflows/integration.yml
