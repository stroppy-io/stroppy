name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_call:

jobs:
  golang-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.3"
          cache: true

      - name: Install linter dependencies
        run: make install-linter

      - name: Run linter
        run: make linter

      - name: Run tests
        run: make tests

  typescript-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install TS dependencies
        run: make ts-setup

      - name: Run type check
        run: make ts-typecheck

      - name: Run TS tests
        run: make ts-test

  integration:
    needs: [golang-ci, typescript-ci]
    uses: ./.github/workflows/integration.yml
